<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E76FF"/>
      <stop offset="100%" stop-color="#4677FE"/>
    </linearGradient>
    <style>
      .display { font-family: 'Geist', 'Inter', -apple-system, system-ui, sans-serif; font-weight: 500; fill: #E8E8E8; letter-spacing: -0.035em; }
      .mute { fill: #6E6E6E; }
      .mono { font-family: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; fill: #6E6E6E; letter-spacing: 0.18em; text-transform: uppercase; }
      .soft { fill: #A8A8A8; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle dot grid hint, top-right -->
  <g fill="#E8E8E8" opacity="0.18">
    <circle cx="1000" cy="90" r="3"/>
    <circle cx="1040" cy="90" r="3"/>
    <circle cx="1080" cy="90" r="3"/>
    <circle cx="1120" cy="90" r="3"/>
    <circle cx="1000" cy="130" r="3"/>
    <circle cx="1040" cy="130" r="3"/>
    <circle cx="1080" cy="130" r="3"/>
    <circle cx="1120" cy="130" r="3"/>
    <circle cx="1000" cy="170" r="3"/>
    <circle cx="1040" cy="170" r="3"/>
    <circle cx="1080" cy="170" r="3"/>
    <circle cx="1120" cy="170" r="3"/>
  </g>

  <!-- top tag -->
  <text x="80" y="100" class="mono" font-size="18">// INTERKOM · v1.0</text>

  <!-- headline -->
  <text x="80" y="240" class="display" font-size="92">A private</text>
  <text x="80" y="340" class="display" font-size="92">social network</text>
  <text x="80" y="440" class="display" font-size="92"><tspan class="mute">for your</tspan><tspan class="display"> company.</tspan></text>
  <!-- underline accent under "company" -->
  <rect x="382" y="456" width="372" height="4" fill="url(#underline)"/>

  <!-- subline -->
  <text x="80" y="510" class="soft" font-size="22" font-family="Geist, Inter, system-ui, sans-serif">
    Chat · Stories · Channels · Presence — workspace-scoped, no public feed.
  </text>

  <!-- footer line -->
  <text x="80" y="572" class="mono" font-size="16">// chat · stories · channels · presence</text>
  <text x="1120" y="572" class="mono" font-size="16" text-anchor="end">interkom.app</text>
</svg>
